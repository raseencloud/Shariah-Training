<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شهادة إتمام الاختبار</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:30px;
    text-align:center;
}

.certificate{
    background:white;
    border:10px double #166534;
    padding:30px;
    max-width:800px;
    margin:auto;
}

h1{
    color:#166534;
}

.box{
    margin:10px 0;
    font-size:18px;
}

.qr{
    margin-top:20px;
}

.signature{
    margin-top:40px;
}

.stamp{
    margin-top:20px;
    font-weight:bold;
    color:#166534;
}
</style>
</head>

<body>

<div class="certificate">

    <h1>شهادة إتمام الاختبار</h1>

    <div class="box">اسم المتدرب: <span id="name"></span></div>

    <div class="box">النتيجة: <span id="score"></span> / <span id="total"></span></div>

    <div class="box">نسبة النجاح: <span id="percent"></span>%</div>

    <div class="box">نسأل الله لك التوفيق والسداد</div>

    <div id="qr" class="qr"></div>

    <div class="stamp">ختم منصة التدريب الفقهي</div>

    <div class="signature">المدير التنفيذي: ____________________</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "";
const score = parseInt(params.get("score") || "0");
const total = parseInt(params.get("total") || "1");
const id = params.get("id") || "";

const percent = Math.round((score / total) * 100);

document.getElementById("name").innerText = name;
document.getElementById("score").innerText = score;
document.getElementById("total").innerText = total;
document.getElementById("percent").innerText = percent;

const verifyUrl = "https://ieashehata1965-netizen.github.io/Shariah-Training/?id=" + id;

new QRCode(document.getElementById("qr"), {
    text: verifyUrl,
    width: 120,
    height: 120
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة سؤال احترافي</title>
<style>
*{
    box-sizing:border-box;
}

body{
    font-family:Tahoma, Arial, sans-serif;
    background:#f0fdf4;
    padding:20px;
    max-width:860px;
    margin:auto;
}

.card{
    background:#fff;
    border:1px solid #d1fae5;
    border-radius:18px;
    padding:24px;
    box-shadow:0 8px 24px rgba(0,0,0,.08);
}

h2{
    margin:0 0 12px;
    color:#14532d;
}

.note{
    margin:0 0 18px;
    color:#4b5563;
    font-size:14px;
    line-height:1.7;
}

input, select, button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:15px;
    font-family:Tahoma, Arial, sans-serif;
}

button{
    border:none;
    cursor:pointer;
    background:#16a34a;
    color:#fff;
    font-weight:700;
}

button.secondary{
    background:#6b7280;
}

button:hover{
    filter:brightness(.96);
}

.counter{
    margin-top:10px;
    font-weight:700;
    color:#065f46;
}
</style>
</head>
<body>

<div class="card">
    <h2>إضافة سؤال</h2>
    <p class="note">يتم تحميل بنك الأسئلة الحالي أولًا، ثم إضافة السؤال الجديد فوقه، ثم تنزيل الملف كاملًا دفعة واحدة.</p>

    <select id="category">
        <option value="">اختر التصنيف</option>
        <option value="فقه">فقه</option>
        <option value="عقيدة">عقيدة</option>
        <option value="توحيد">توحيد</option>
        <option value="تفسير">تفسير</option>
        <option value="حديث">حديث</option>
        <option value="أصول فقه">أصول فقه</option>
        <option value="لغة عربية">لغة عربية</option>
        <option value="سيرة">سيرة</option>
    </select>

    <select id="level">
        <option value="">اختر المستوى</option>
        <option value="سهل">سهل</option>
        <option value="متوسط">متوسط</option>
        <option value="صعب">صعب</option>
    </select>

    <input id="source" placeholder="المصدر (اختياري)">
    <input id="q" placeholder="السؤال">

    <input id="a1" placeholder="الخيار 1">
    <input id="a2" placeholder="الخيار 2">
    <input id="a3" placeholder="الخيار 3">
    <input id="a4" placeholder="الخيار 4">

    <input id="c" type="number" min="0" max="3" placeholder="رقم الإجابة الصحيحة (0-3)">

    <button onclick="addQ()">إضافة السؤال</button>
    <button onclick="download()">تحميل JSON</button>
    <button class="secondary" onclick="clearForm()" type="button">مسح الحقول</button>

    <div id="counter" class="counter">جارٍ تحميل بنك الأسئلة...</div>
</div>

<script>
let data = [];
let nextId = 1;
let dataLoaded = false;

document.addEventListener("DOMContentLoaded", loadExistingQuestions);

function normalizeQuestion(item) {
    if (!item || typeof item !== "object") return null;

    const question = String(item.q ?? item.question ?? "").trim();

    const rawAnswers = Array.isArray(item.a)
        ? item.a
        : (Array.isArray(item.options) ? item.options : []);

    const answers = rawAnswers.map(v => String(v ?? "").trim());

    const correctValue = Number(item.c ?? item.correct);
    const correct = Number.isInteger(correctValue) ? correctValue : NaN;

    const idValue = Number(item.id);
    const id = Number.isFinite(idValue) && idValue > 0 ? idValue : nextId++;

    const category = String(item.category ?? "غير مصنف").trim() || "غير مصنف";
    const level = String(item.level ?? "غير محدد").trim() || "غير محدد";
    const source = String(item.source ?? "غير محدد").trim() || "غير محدد";

    if (
        !question ||
        answers.length !== 4 ||
        answers.some(a => !a) ||
        !Number.isInteger(correct) ||
        correct < 0 ||
        correct > 3
    ) {
        return null;
    }

    return {
        id,
        category,
        level,
        source,
        q: question,
        a: answers,
        c: correct
    };
}

async function loadExistingQuestions() {
    dataLoaded = false;

    try {
        const res = await fetch("fiqh-questions.json", { cache: "no-store" });
        if (!res.ok) throw new Error("تعذر تحميل ملف الأسئلة");

        const raw = await res.json();
        data = Array.isArray(raw) ? raw.map(normalizeQuestion).filter(Boolean) : [];
    } catch (err) {
        console.error(err);
        data = [];
    }

    nextId = data.length ? Math.max(...data.map(item => Number(item.id) || 0)) + 1 : 1;
    dataLoaded = true;
    updateCounter();
}

function updateCounter() {
    document.getElementById("counter").textContent = `إجمالي الأسئلة: ${data.length}`;
}

function clearForm() {
    document.getElementById("category").value = "";
    document.getElementById("level").value = "";
    document.getElementById("source").value = "";
    document.getElementById("q").value = "";
    document.getElementById("a1").value = "";
    document.getElementById("a2").value = "";
    document.getElementById("a3").value = "";
    document.getElementById("a4").value = "";
    document.getElementById("c").value = "";
    document.getElementById("q").focus();
}

function addQ() {
    if (!dataLoaded) {
        alert("جارٍ تحميل بنك الأسئلة، انتظر لحظة ثم أعد المحاولة");
        return;
    }

    const category = document.getElementById("category").value.trim();
    const level = document.getElementById("level").value.trim();
    const source = document.getElementById("source").value.trim() || "غير محدد";

    const q = document.getElementById("q").value.trim();
    const a1 = document.getElementById("a1").value.trim();
    const a2 = document.getElementById("a2").value.trim();
    const a3 = document.getElementById("a3").value.trim();
    const a4 = document.getElementById("a4").value.trim();
    const c = parseInt(document.getElementById("c").value, 10);

    if (!category || !level || !q || !a1 || !a2 || !a3 || !a4 || isNaN(c)) {
        alert("يرجى إكمال جميع البيانات");
        return;
    }

    if (c < 0 || c > 3) {
        alert("رقم الإجابة الصحيحة يجب أن يكون بين 0 و 3");
        return;
    }

    const normalizedQuestion = q.toLowerCase().replace(/\s+/g, " ").trim();
    const duplicate = data.some(item =>
        String(item.q).toLowerCase().replace(/\s+/g, " ").trim() === normalizedQuestion
    );

    if (duplicate) {
        alert("هذا السؤال موجود بالفعل");
        return;
    }

    data.push({
        id: nextId++,
        category,
        level,
        source,
        q,
        a: [a1, a2, a3, a4],
        c
    });

    updateCounter();
    clearForm();
    alert("تمت إضافة السؤال");
}

function download() {
    if (data.length === 0) {
        alert("لا توجد بيانات");
        return;
    }

    const exportData = [...data].sort((a, b) => Number(a.id) - Number(b.id));

    const blob = new Blob(
        [JSON.stringify(exportData, null, 2)],
        { type: "application/json;charset=utf-8" }
    );

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "fiqh-questions.json";
    document.body.appendChild(link);
    link.click();
    link.remove();

    setTimeout(() => URL.revokeObjectURL(url), 1000);
}
</script>

</body>
</html>

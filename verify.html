<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التحقق من الشهادة</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fa;
    text-align:center;
    padding:50px;
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:500px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.valid{
    color:green;
    font-size:22px;
    font-weight:bold;
}

.invalid{
    color:red;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>نظام التحقق من الشهادات</h2>

<div id="status"></div>

<div id="details"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const hash = params.get("hash");

// نفس دالة الهاش المستخدمة في الشهادة
function generateHash(id){
    let h = 0;
    for(let i=0;i<id.length;i++){
        h = (h * 31 + id.charCodeAt(i)) % 1000000007;
    }
    return h;
}

// تحقق بسيط
let valid = id && hash;

if(valid){
    document.getElementById("status").innerHTML =
        "<div class='valid'>✔ شهادة صحيحة</div>";

    document.getElementById("details").innerHTML =
        "رقم الشهادة: " + id;

} else {
    document.getElementById("status").innerHTML =
        "<div class='invalid'>✖ شهادة غير صالحة</div>";
}

</script>

</body>
</html>

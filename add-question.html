<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بنك الأسئلة المصحح</title>

<style>
body{
    font-family:Tahoma;
    background:#f5f7fb;
    padding:20px;
    max-width:1100px;
    margin:auto;
}

.card{
    background:#fff;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
}

input,textarea,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    font-size:14px;
}

button{
    background:#2563eb;
    color:#fff;
    border:0;
    cursor:pointer;
    border-radius:6px;
}

.danger{background:#dc2626;}
.gray{background:#6b7280;}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<script>
const PASSWORD = "1234";
let access = sessionStorage.getItem("access");

if(access !== "ok"){
    let p = prompt("أدخل كلمة المرور");
    if(p === PASSWORD){
        sessionStorage.setItem("access","ok");
    }else{
        document.body.innerHTML = "<h2 style='text-align:center'>غير مصرح</h2>";
        throw new Error("Access denied");
    }
}
</script>

<div class="card">
<h2>🔍 بحث</h2>
<input id="search" oninput="render()" placeholder="ابحث عن سؤال">
</div>

<div class="card">
<h2>➕ إضافة سؤال</h2>

<input id="q" placeholder="السؤال">
<input id="a1" placeholder="الخيار 1">
<input id="a2" placeholder="الخيار 2">
<input id="a3" placeholder="الخيار 3">
<input id="a4" placeholder="الخيار 4">
<input id="c" type="number" placeholder="الإجابة الصحيحة (0-3)">

<button onclick="save()">حفظ</button>
<button class="gray" onclick="clearForm()">تفريغ</button>
</div>

<div class="card">
<h2>📋 بنك الأسئلة</h2>
<table>
<thead>
<tr>
<th>السؤال</th>
<th>الإجراء</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="card">
<h2>📥 إضافة جماعية</h2>
<textarea id="bulk" rows="6"></textarea>
<button onclick="addBulk()">إضافة جماعية</button>
</div>

<script>

let data = [];
let nextId = 1;
let editId = null;

function normalizeText(text){
    return (text || "")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ")
        .replace(/[؟?]/g, "")
        .replace(/[.,،]/g, "");
}

function isDuplicateQuestion(newQuestion){

    let newNorm = normalizeText(newQuestion);

    return data.some(item =>
        normalizeText(item.q) === newNorm
    );
}

/* ===================== SAVE ===================== */
   function save(){

   const q = document.getElementById("q").value.trim();
   const a1 = document.getElementById("a1").value.trim();
   const a2 = document.getElementById("a2").value.trim();
   const a3 = document.getElementById("a3").value.trim();
   const a4 = document.getElementById("a4").value.trim();
   let c = parseInt(document.getElementById("c").value);

   if(isDuplicateQuestion(q) && editId === null){
       alert("هذا السؤال موجود مسبقاً في بنك الأسئلة");
       return;
   }

   if(!q || !a1 || !a2 || !a3 || !a4){
       alert("أكمل جميع البيانات");
       return;
   }
       
    if(isNaN(c) || c < 0 || c > 3){
        alert("الإجابة يجب أن تكون بين 0 و 3");
        return;
    }

    const obj = {
        id: editId ? editId : nextId++,
        q,
        a:[a1,a2,a3,a4],
        c
    };

    if(editId){
        let idx = data.findIndex(x=>x.id===editId);
        if(idx !== -1) data[idx] = obj;
        editId = null;
    }else{
        data.push(obj);
    }

    clearForm();
    render();
}

/* ===================== RENDER ===================== */
function render(){

    let keyword = (document.getElementById("search").value || "").toLowerCase();

    let filtered = data.filter(x =>
        (x.q || "").toLowerCase().includes(keyword)
    );

    document.getElementById("list").innerHTML =
    filtered.map(x=>
        `<tr>
            <td>${x.q}</td>
            <td>
                <button onclick="edit(${x.id})">تعديل</button>
                <button class="danger" onclick="del(${x.id})">حذف</button>
            </td>
        </tr>`
    ).join("");
}

/* ===================== EDIT ===================== */
function edit(id){

    let x = data.find(i=>i.id===id);
    if(!x) return;

    editId = id;

    document.getElementById("q").value = x.q;
    document.getElementById("a1").value = x.a[0];
    document.getElementById("a2").value = x.a[1];
    document.getElementById("a3").value = x.a[2];
    document.getElementById("a4").value = x.a[3];
    document.getElementById("c").value = x.c;
}

/* ===================== DELETE ===================== */
function del(id){
    if(!confirm("حذف السؤال؟")) return;
    data = data.filter(x=>x.id!==id);
    render();
}

/* ===================== BULK ADD ===================== */
function addBulk(){

    const text = document.getElementById("bulk").value.trim();
    let blocks = text.split(/\n\s*\n+/).filter(b=>b.trim());

    let added = 0;

    blocks.forEach(block=>{

        let lines = block.split("\n");

        let qText = "";
        let a = ["","","",""];
        let c = 0;

        for(let line of lines){

            line = line.trim();

            if(!qText && (line.includes("?") || line.includes("؟") || line.length > 10)){
                qText = line;
            }

            else if(line.startsWith("أ")) a[0] = line.replace("أ","").trim();
            else if(line.startsWith("ب")) a[1] = line.replace("ب","").trim();
            else if(line.startsWith("ج")) a[2] = line.replace("ج","").trim();
            else if(line.startsWith("د")) a[3] = line.replace("د","").trim();

            else if(line.includes("الإجابة")){
                let parts = line.split(":");
                if(parts.length > 1){
                    c = parseInt(parts[1].trim());
                }
            }
        }

        if(qText && a[0] && a[1] && a[2] && a[3]){

            data.push({
                id: nextId++,
                q: qText,
                a,
                c: isNaN(c) ? 0 : c
            });

            added++;
        }
    });

    alert("تم إضافة " + added + " سؤال");
    document.getElementById("bulk").value = "";
    render();
}

/* ===================== CLEAR ===================== */
function clearForm(){
    ["q","a1","a2","a3","a4","c"].forEach(id=>{
        document.getElementById(id).value="";
    });
    editId=null;
}

render();

</script>

</body>
</html>

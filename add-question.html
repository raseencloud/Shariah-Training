<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام بنك الأسئلة المحسن</title>

<style>
body{
    font-family:Tahoma;
    background:#f0fdf4;
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid #ddd;
}

input,textarea,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    font-size:14px;
}

button{
    background:#16a34a;
    color:#fff;
    border:0;
    cursor:pointer;
}

.danger{background:#dc2626;}
.small{background:#6b7280;}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<!-- 🔐 حماية الدخول -->
<script>
const PASSWORD = "1234";
let access = sessionStorage.getItem("admin_access");

if(access !== "granted"){
    let input = prompt("أدخل كلمة مرور المدير:");

    if(input === PASSWORD){
        sessionStorage.setItem("admin_access","granted");
    }else{
        document.body.innerHTML = "<h2 style='text-align:center'>غير مصرح بالدخول</h2>";
        throw new Error("Access Denied");
    }
}
</script>

<div class="card">
<h2>🔍 بحث عن سؤال</h2>
<input id="searchBox" placeholder="ابحث عن سؤال..." oninput="render()">
</div>

<div class="card">
<button onclick="toggleForm()">➕ إضافة / تعديل سؤال</button>

<div id="formBox" style="display:none; margin-top:15px;">

<h2>إدخال سؤال</h2>

<input id="q" placeholder="السؤال">
<input id="a1" placeholder="الخيار 1">
<input id="a2" placeholder="الخيار 2">
<input id="a3" placeholder="الخيار 3">
<input id="a4" placeholder="الخيار 4">
<input id="c" type="number" placeholder="الإجابة الصحيحة (0-3)">

<button onclick="saveQuestion()">حفظ</button>
<button class="small" onclick="clearForm()">تفريغ</button>

</div>
</div>

<div class="card">
<h2>📥 إضافة جماعية</h2>
<textarea id="bulk" rows="6"></textarea>
<button onclick="addBulk()">تحويل وإضافة</button>
</div>

<div class="card">
<h2>📋 قائمة الأسئلة</h2>
<table>
<thead>
<tr>
<th>السؤال</th>
<th>الإجراء</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="card">
<button onclick="exportJSON()">⬇ تصدير JSON</button>
</div>

<script>

let data = [];
let nextId = 1;
let editId = null;

/* ===================== تحميل ===================== */

fetch("https://raw.githubusercontent.com/ieashehata1965-netizen/Shariah-Training/main/fiqh-questions.json")
  .then(r => {
      if (!r.ok) throw new Error("HTTP Error: " + r.status);
      return r.json();
  })
  .then(data => {
      console.log("Loaded:", data.length);

      window.data = data;

      nextId = data.length
          ? Math.max(...data.map(x => x.id || 0)) + 1
          : 1;

      render();
  })
  .catch(err => {
      console.error("LOAD FAILED:", err);
      data = [];
      render();
  });
    
/* ===================== أدوات ===================== */
function normalizeText(text){
    return (text || "")
        .toLowerCase()
        .trim()
        .replace(/\s+/g," ")
        .replace(/[؟?]/g,"")
        .replace(/[.,،]/g,"");
}

function isDuplicateQuestion(q){
    return data.some(x =>
        normalizeText(x.q) === normalizeText(q)
    );
}

/* ===================== حفظ ===================== */
function saveQuestion(){

    const q = document.getElementById("q").value.trim();
    const a1 = document.getElementById("a1").value.trim();
    const a2 = document.getElementById("a2").value.trim();
    const a3 = document.getElementById("a3").value.trim();
    const a4 = document.getElementById("a4").value.trim();
    const c  = parseInt(document.getElementById("c").value);

    if(!q || !a1 || !a2 || !a3 || !a4){
        alert("أكمل البيانات");
        return;
    }

    if(isNaN(c) || c < 0 || c > 3){
        alert("الإجابة يجب أن تكون بين 0 و 3");
        return;
    }

    /* منع التكرار */
    if(isDuplicateQuestion(q) && editId === null){
        alert("هذا السؤال موجود مسبقاً");
        return;
    }

    const obj = {
        id: editId ? editId : nextId++,
        q,
        a:[a1,a2,a3,a4],
        c
    };

    if(editId){
        let idx = data.findIndex(x=>x.id===editId);
        if(idx !== -1) data[idx] = obj;
        editId = null;
    }else{
        data.push(obj);
    }

    clearForm();
    render();
}

/* ===================== عرض ===================== */
function render(){

    let keyword = (document.getElementById("searchBox").value || "")
        .toLowerCase();

    let filtered = data.filter(x =>
        (x.q || "").toLowerCase().includes(keyword)
    );

    document.getElementById("list").innerHTML =
    filtered.map(x=>`
        <tr>
            <td>${x.q}</td>
            <td>
                <button onclick="editQuestion(${x.id})">تعديل</button>
                <button class="danger" onclick="deleteQ(${x.id})">حذف</button>
            </td>
        </tr>
    `).join("");
}

/* ===================== تعديل ===================== */
function editQuestion(id){

    let item = data.find(x=>x.id===id);
    if(!item) return;

    editId = id;

    document.getElementById("q").value = item.q;
    document.getElementById("a1").value = item.a[0];
    document.getElementById("a2").value = item.a[1];
    document.getElementById("a3").value = item.a[2];
    document.getElementById("a4").value = item.a[3];
    document.getElementById("c").value = item.c;

    document.getElementById("formBox").style.display = "block";
}

/* ===================== حذف ===================== */
function deleteQ(id){
    if(!confirm("حذف السؤال؟")) return;
    data = data.filter(x=>x.id!==id);
    render();
}

/* ===================== إضافة جماعية ===================== */
function addBulk(){

    let text = document.getElementById("bulk").value.trim();
    let blocks = text.split(/\n\s*\n+/).filter(b=>b);

    let added = 0;

    blocks.forEach(block=>{

        let lines = block.split("\n");

        let qText = "";
        let a = ["","","",""];
        let c = 0;

        lines.forEach(line=>{

            line = line.trim();

            if(!qText && (line.includes("?") || line.includes("؟") || line.length>10)){
                qText = line;
            }

            else if(line.startsWith("أ")) a[0]=line.replace("أ","").trim();
            else if(line.startsWith("ب")) a[1]=line.replace("ب","").trim();
            else if(line.startsWith("ج")) a[2]=line.replace("ج","").trim();
            else if(line.startsWith("د")) a[3]=line.replace("د","").trim();

            else if(line.includes("الإجابة")){
                let parts = line.split(":");
                if(parts.length>1) c=parseInt(parts[1]);
            }
        });

        if(qText && a[0] && a[1] && a[2] && a[3]){
            data.push({
                id: nextId++,
                q:qText,
                a,
                c: isNaN(c)?0:c
            });
            added++;
        }
    });

    alert("تمت إضافة " + added + " سؤال");
    document.getElementById("bulk").value="";
    render();
}

/* ===================== تصدير ===================== */
function exportJSON(){
    let blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="fiqh-questions.json";
    a.click();
}

/* ===================== تنظيف ===================== */
function clearForm(){
    ["q","a1","a2","a3","a4","c"].forEach(id=>{
        document.getElementById(id).value="";
    });
    editId=null;
}

/* ===================== toggle ===================== */
function toggleForm(){
    let box=document.getElementById("formBox");
    box.style.display = (box.style.display==="block")?"none":"block";
}

render();

</script>

</body>
</html>

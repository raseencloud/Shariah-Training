<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة إدارة بنك الأسئلة</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    padding: 20px;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 900px;
    margin: auto;
    box-shadow: 0 0 10px #ccc;
}
input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    border-radius: 5px;
    border: 1px solid #aaa;
}
button {
    padding: 10px 20px;
    background: #0077cc;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #005fa3;
}
hr { margin: 20px 0; }
.hidden { display: none; }
.search-box {
    background: #eef;
    padding: 10px;
    border-radius: 5px;
}
.question-card {
    border: 1px solid #ccc;
    padding: 10px;
    margin: 10px 0;
    background: #fafafa;
}
</style>
</head>

<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="container">
<h2>تسجيل دخول لوحة الإدارة</h2>
<label>كلمة المرور</label>
<input id="adminPass" type="password" placeholder="أدخل كلمة المرور">
<button onclick="login()">دخول</button>
</div>

<!-- شاشة الإدارة -->
<div id="adminScreen" class="container hidden">

<h2>لوحة إدارة بنك الأسئلة</h2>

<label>GitHub Token (مرة واحدة فقط)</label>
<input id="token" type="password" placeholder="ضع التوكن هنا">

<button onclick="saveToken()">حفظ التوكن</button>

<hr>

<h3>إضافة سؤال جديد</h3>

<label>نص السؤال</label>
<textarea id="q"></textarea>

<label>الخيارات الأربعة</label>
<input id="a1" placeholder="الخيار الأول">
<input id="a2" placeholder="الخيار الثاني">
<input id="a3" placeholder="الخيار الثالث">
<input id="a4" placeholder="الخيار الرابع">

<label>الإجابة الصحيحة</label>
<select id="correct">
    <option value="0">الخيار 1</option>
    <option value="1">الخيار 2</option>
    <option value="2">الخيار 3</option>
    <option value="3">الخيار 4</option>
</select>

<label>التصنيف</label>
<select id="category">
    <option>فقه</option>
    <option>عقيدة</option>
    <option>حديث</option>
    <option>تفسير</option>
    <option>أصول فقه</option>
    <option>ثقافة إسلامية</option>
</select>

<label>المصدر</label>
<input id="source" placeholder="مثال: صحيح البخاري">

<label>مستوى الصعوبة</label>
<select id="level">
    <option>سهل</option>
    <option>متوسط</option>
    <option>صعب</option>
</select>

<button onclick="saveQuestion()">حفظ السؤال</button>

<hr>

<h3>إضافة مجموعة أسئلة دفعة واحدة (Bulk Add)</h3>
<textarea id="bulkInput" placeholder='ضع هنا مجموعة أسئلة بصيغة JSON'></textarea>
<button onclick="bulkAdd()">إضافة المجموعة</button>

<hr>

<h3>بحث وفلاتر</h3>
<div class="search-box">
<input id="searchText" placeholder="بحث في نص السؤال" oninput="applyFilters()">

<label>التصنيف</label>
<select id="filterCategory" onchange="applyFilters()">
    <option value="">الكل</option>
    <option>فقه</option>
    <option>عقيدة</option>
    <option>حديث</option>
    <option>تفسير</option>
    <option>أصول فقه</option>
    <option>ثقافة إسلامية</option>
</select>

<label>الصعوبة</label>
<select id="filterLevel" onchange="applyFilters()">
    <option value="">الكل</option>
    <option>سهل</option>
    <option>متوسط</option>
    <option>صعب</option>
</select>

</div>

<hr>

<h3>قائمة الأسئلة</h3>
<div id="questionsList"></div>

</div>

<script>
let questions = [];
let editingId = null;

// كلمة المرور
const ADMIN_PASSWORD = "123456"; // غيرها كما تريد

function login() {
    const pass = document.getElementById("adminPass").value;
    if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("adminScreen").classList.remove("hidden");
        loadToken();
        loadQuestions();
    } else {
        alert("كلمة المرور غير صحيحة");
    }
}

// حفظ التوكن
function saveToken() {
    localStorage.setItem("githubToken", document.getElementById("token").value);
    alert("تم حفظ التوكن");
}

// تحميل التوكن
function loadToken() {
    const t = localStorage.getItem("githubToken");
    if (t) document.getElementById("token").value = t;
}

// تحميل الأسئلة
async function loadQuestions() {
    const token = localStorage.getItem("githubToken");
    const url = "https://api.github.com/repos/ieashehata1965-netizen/Shariah-Training/contents/questions.json";

    const res = await fetch(url, {
        headers: { "Authorization": "token " + token }
    });

    const data = await res.json();
    const content = atob(data.content);
    questions = JSON.parse(content);

    window.fileSha = data.sha;

    renderQuestions(questions);
}

// عرض الأسئلة
function renderQuestions(list) {
    const box = document.getElementById("questionsList");
    box.innerHTML = "";

    list.forEach(q => {
        const div = document.createElement("div");
        div.className = "question-card";
        div.innerHTML = `
            <b>ID:</b> ${q.id}<br>
            <b>السؤال:</b> ${q.q}<br>
            <b>الخيارات:</b> ${q.a.join(" | ")}<br>
            <b>الصحيح:</b> ${q.c}<br>
            <button onclick="editQuestion(${q.id})">تعديل</button>
            <button onclick="deleteQuestion(${q.id})">حذف</button>
        `;
        box.appendChild(div);
    });
}

// تعديل سؤال
function editQuestion(id) {
    const q = questions.find(x => x.id === id);

    editingId = id;

    document.getElementById("q").value = q.q;
    document.getElementById("a1").value = q.a[0];
    document.getElementById("a2").value = q.a[1];
    document.getElementById("a3").value = q.a[2];
    document.getElementById("a4").value = q.a[3];
    document.getElementById("correct").value = q.c;
    document.getElementById("category").value = q.category;
    document.getElementById("source").value = q.source;
    document.getElementById("level").value = q.level;
}

// حذف سؤال
function deleteQuestion(id) {
    questions = questions.filter(q => q.id !== id);
    saveToGitHub();
}

// حفظ سؤال جديد أو تعديل
function saveQuestion() {
    const newQ = {
        id: editingId || (questions.length ? questions[questions.length - 1].id + 1 : 1),
        q: document.getElementById("q").value,
        a: [
            document.getElementById("a1").value,
            document.getElementById("a2").value,
            document.getElementById("a3").value,
            document.getElementById("a4").value
        ],
        c: parseInt(document.getElementById("correct").value),
        category: document.getElementById("category").value,
        source: document.getElementById("source").value,
        level: document.getElementById("level").value
    };

    if (editingId) {
        const index = questions.findIndex(q => q.id === editingId);
        questions[index] = newQ;
        editingId = null;
    } else {
        questions.push(newQ);
    }

    saveToGitHub();
}

// إضافة مجموعة أسئلة دفعة واحدة
function bulkAdd() {
    try {
        const arr = JSON.parse(document.getElementById("bulkInput").value);
        arr.forEach(q => {
            q.id = questions.length ? questions[questions.length - 1].id + 1 : 1;
            questions.push(q);
        });
        saveToGitHub();
    } catch (e) {
        alert("صيغة JSON غير صحيحة");
    }
}

// رفع الملف إلى GitHub
async function saveToGitHub() {
    const token = localStorage.getItem("githubToken");
    const url = "https://api.github.com/repos/ieashehata1965-netizen/Shariah-Training/contents/questions.json";

    const updatedContent = btoa(JSON.stringify(questions, null, 2));

    await fetch(url, {
        method: "PUT",
        headers: {
            "Authorization": "token " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Update questions",
            content: updatedContent,
            sha: window.fileSha
        })
    });

    alert("تم حفظ التعديلات بنجاح");
    loadQuestions();
}

// تطبيق الفلاتر
function applyFilters() {
    let filtered = questions;

    const text = document.getElementById("searchText").value;
    const cat = document.getElementById("filterCategory").value;
    const lvl = document.getElementById("filterLevel").value;

    if (text) filtered = filtered.filter(q => q.q.includes(text));
    if (cat) filtered = filtered.filter(q => q.category === cat);
    if (lvl) filtered = filtered.filter(q => q.level === lvl);

    renderQuestions(filtered);
}

</script>

</body>
</html>

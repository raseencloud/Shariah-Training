<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب الفقهي</title>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<style>
body{
    background:#d1fae5;
    font-family:Tahoma, Arial;
    text-align:center;
    padding:20px;
}

.main-card{
    max-width:780px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    border-top:6px solid #16a34a;
}

h1{color:#065f46;}

input,select,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:15px;
}

button{
    background:#16a34a;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{background:#15803d;}

.question{
    font-size:22px;
    font-weight:700;
    color:#111827;
    margin:20px 0;
    line-height:1.8;
}

.answer{
    background:#f3f4f6;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    border:1px solid #d1d5db;
    font-weight:700;
    color:#000;
}

.answer:hover{background:#dcfce7;}

.meta{
    font-size:13px;
    color:#166534;
    font-weight:700;
    margin-bottom:8px;
}
    @media print {

    body * {
        visibility: hidden !important;
    }

    #certificate,
    #certificate * {
        visibility: visible !important;
    }

    #certificate {
        position: absolute !important;
        top: 0;
        left: 0;
        width: 100%;
    }

    #quiz {
        display: none !important;
    }
}
    
</style>
</head>

<body>

<h1>منصة التدريب الفقهي</h1>

<div class="main-card">

<input id="candidateName" placeholder="اسم المتدرب">

<select id="categoryFilter">
<option value="all">كل التصنيفات</option>
<option value="فقه">فقه</option>
<option value="عقيدة">عقيدة</option>
<option value="توحيد">توحيد</option>
<option value="تفسير">تفسير</option>
<option value="حديث">حديث</option>
<option value="أصول فقه">أصول فقه</option>
<option value="لغة عربية">لغة عربية</option>
<option value="سيرة">سيرة</option>
</select>

<select id="levelFilter">
<option value="all">كل المستويات</option>
<option value="سهل">سهل</option>
<option value="متوسط">متوسط</option>
<option value="صعب">صعب</option>
</select>

<select id="questionCount">
<option value="5">5</option>
<option value="10" selected>10</option>
<option value="20">20</option>
<option value="30">30</option>
</select>

<button onclick="startExam()">ابدأ الاختبار</button>

<div id="quiz"></div>

<div id="certificate" style="display:none; margin-top:20px; padding:25px; border:8px double #166534; border-radius:18px; background:linear-gradient(135deg,#ecfdf5,#ffffff);">

    <h2 style="color:#166534; margin-bottom:20px;">شهادة إتمام الاختبار</h2>

    <p>اسم المتدرب: <span id="certName"></span></p>

    <p>رقم الشهادة: <span id="id"></span></p>

    <div id="qr" style="margin:20px auto;"></div>

    <p style="margin-top:30px;">ختم واعتماد المدير التنفيذي للمنصة</p>

</div>
    
<script>

let allQuestions = [];
let questions = [];
let current = 0;
let score = 0;
let candidateName = "";
let selectedCount = 5;
let answered = false;

async function loadQuestions(){
    try{
        const res = await fetch("fiqh-questions.json", { cache:"no-store" });
        if(!res.ok) return false;

        const raw = await res.json();

        if(!Array.isArray(raw)) return false;

        allQuestions = raw.map(normalize).filter(Boolean);

        questions = allQuestions.slice(0, selectedCount);

        return allQuestions.length > 0;

    }catch(e){
        document.getElementById("quiz").innerHTML = "فشل تحميل الملف";
        return false;
    }
}

function normalize(item){
    if(!item) return null;

    const q = String(item.q ?? item.question ?? "").trim();

    const a = Array.isArray(item.a)
        ? item.a
        : (Array.isArray(item.options) ? item.options : []);

    const c = Number(item.c ?? item.correct);

    if(!q || a.length !== 4 || a.some(x => !x) || !Number.isInteger(c) || c < 0 || c > 3){
        return null;
    }

    return {
        category: item.category || "غير مصنف",
        level: item.level || "غير محدد",
        q,
        a,
        c
    };
}

function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
}

async function startExam(){

    candidateName = document.getElementById("candidateName").value.trim();

    if(!candidateName){
        alert("أدخل الاسم");
        return;
    }

    selectedCount = parseInt(document.getElementById("questionCount").value,10);

    document.getElementById("quiz").innerHTML = "جاري التحميل...";

    const ok = await loadQuestions();
    if(!ok){
        document.getElementById("quiz").innerHTML = "لا توجد أسئلة";
        return;
    }

    const cat = document.getElementById("categoryFilter").value;
    const lvl = document.getElementById("levelFilter").value;

    let pool = allQuestions.filter(q =>
        (cat === "all" || q.category === cat) &&
        (lvl === "all" || q.level === lvl)
    );

    if(pool.length === 0){
        document.getElementById("quiz").innerHTML =
            "لا توجد أسئلة مطابقة للفلاتر";
        return;
    }

    questions = shuffle(pool).slice(0, selectedCount);

    current = 0;
    score = 0;

    showQuestion();
}

function showQuestion(){

    answered = false;

    if(current >= questions.length){
        showResult();
        return;
    }

    const q = questions[current];

    let html = "<div class='question'>";
    html += "<div class='meta'>سؤال " + (current+1) + " من " + questions.length + "</div>";
    html += "<div>" + q.q + "</div>";

    q.a.forEach((ans,i)=>{
        html += "<div class='answer' onclick='answer(" + i + ")'>" + ans + "</div>";
    });

    html += "</div>";

    document.getElementById("quiz").innerHTML = html;
}

function answer(i){

    if(answered) return;
    answered = true;

    const q = questions[current];
    const boxes = document.querySelectorAll(".answer");

    if(i === q.c){
        score++;
        if(boxes[i]) boxes[i].style.background = "#dcfce7";
    }else{
        if(boxes[i]) boxes[i].style.background = "#fee2e2";
        if(boxes[q.c]) boxes[q.c].style.background = "#dcfce7";
    }

    current++;
    setTimeout(showQuestion,500);
}

function showResult() {

    const percent = questions.length
        ? Math.round((score / questions.length) * 100)
        : 0;

    const level =
        percent >= 90 ? "ممتاز" :
        percent >= 75 ? "جيد جداً" :
        percent >= 60 ? "جيد" :
        "يحتاج تطوير";

    const resultHTML = `
        <div id="resultBox" class="result-container">
            <h2>النتيجة</h2>
            <p>الاسم: ${candidateName}</p>
            <p>الصحيح: ${score}</p>
            <p>الخطأ: ${questions.length - score}</p>
            <p>النسبة: ${percent}%</p>
            <p>التقييم: ${level}</p>
            <div class="buttons">
                <button onclick="printCertificate()">طباعة الشهادة</button>
                <button onclick="location.reload()">إعادة</button>
            </div>
        </div>
    `;

    const quiz = document.getElementById("quiz");
    quiz.innerHTML = "";
    quiz.insertAdjacentHTML("beforeend", resultHTML);

    document.getElementById("certName").innerText = candidateName;
    document.getElementById("certificate").style.display = "none";
}
    
function printCertificate() {

    const certId = "FIQH-" + new Date().getFullYear() + "-" + Math.floor(Math.random() * 100000);
    const verifyUrl = "https://example.com/verify.html?id=" + certId;

    const quiz = document.getElementById("quiz");
    const certificate = document.getElementById("certificate");

    quiz.style.display = "none";
    certificate.style.display = "block";

    document.getElementById("id").innerText = certId;
    document.getElementById("certName").innerText = candidateName;

    const qrContainer = document.getElementById("qr");
    qrContainer.innerHTML = "";

    if (window.QRCode) {
        new QRCode(qrContainer, {
            text: verifyUrl,
            width: 110,
            height: 110
        });
    }

  setTimeout(() => {

    console.log(document.getElementById("certificate").style.display);

    requestAnimationFrame(() => {

        requestAnimationFrame(() => {
            window.print();
        });

    });

}, 2000);
}
</script>

</body>
</html>

<style>

<body>

<h1>منصة التدريب الفقهي</h1>

<div class="main-card">

<input id="candidateName" placeholder="اسم المتدرب">

<select id="categoryFilter">
    <option value="all">كل التصنيفات</option>
    <option value="فقه">فقه</option>
    <option value="عقيدة">عقيدة</option>
    <option value="توحيد">توحيد</option>
    <option value="تفسير">تفسير</option>
    <option value="حديث">حديث</option>
    <option value="أصول فقه">أصول فقه</option>
    <option value="لغة عربية">لغة عربية</option>
    <option value="سيرة">سيرة</option>
    <option value="منوعات إسلامية">منوعات إسلامية</option>
</select>

<select id="levelFilter">
    <option value="all">كل المستويات</option>
    <option value="سهل">سهل</option>
    <option value="متوسط">متوسط</option>
    <option value="صعب">صعب</option>
</select>

<select id="questionCount">
    <option value="3" selected>3</option>
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="20">20</option>
    <option value="30">30</option>
    <option value="50">50</option>
    <option value="80">80</option>
    <option value="100">100</option>
</select>

</div>

<button onclick="startExam()">ابدأ الاختبار</button>

<div id="quiz"></div>
        
<div id="certificate" style="display:none; margin-top:20px; padding:25px; border:8px double #166534; border-radius:18px; background:linear-gradient(135deg,#ecfdf5,#ffffff);">

    <h2 style="color:#166534; margin-bottom:20px;">شهادة إتمام الاختبار</h2>

    <p>اسم المتدرب: <span id="certName"></span></p>
        <p>النتيجة: <span id="score"></span> / <span id="total"></span></p>
        <p>نسبة النجاح: <span id="percent"></span>%</p>
        

    <p>رقم الشهادة: <span id="id"></span></p>

    <div id="qr" style="margin:20px auto;"></div>

    <p style="margin-top:30px;">ختم واعتماد المدير التنفيذي للمنصة</p>

</div>
    
<script>

let allQuestions = [];
let questions = [];
let current = 0;
let score = 0;
let candidateName = "";
let selectedCount = 5;
let answered = false;
let wrongAnswers = [];

async function loadQuestions() {
    try {

const res = await fetch("https://raw.githubusercontent.com/ieashehata1965-netizen/Shariah-Training/main/fiqh-questions.json", { cache: "no-store" });
           
        if (!res.ok) {
            throw new Error("HTTP Error: " + res.status);
        }

        const rawText = await res.text();

        let raw;
        try {
            raw = JSON.parse(rawText);
        } catch (jsonErr) {
            console.error("JSON Parse Error:", rawText);
            throw new Error("Invalid JSON file");
        }

       if (!Array.isArray(raw)) {
    console.warn("Unexpected data format:", raw);
    throw new Error("Data is not an array");
}

        allQuestions = raw.map(normalize).filter(Boolean);

        selectedCount = selectedCount || allQuestions.length;

        if (selectedCount > allQuestions.length) {
            selectedCount = allQuestions.length;
        }

        questions = allQuestions.slice(0, selectedCount);

        console.log("Loaded questions:", allQuestions.length);

        return allQuestions.length > 0;

    } catch (e) {
        console.error("Load Questions Failed:", e);

        document.getElementById("quiz").innerHTML =
            "فشل تحميل الملف - تحقق من console";

        return false;
    }
}        
        
function normalize(item){
    if(!item) return null;

    const q = String(item.q ?? "").trim();

    const a = Array.isArray(item.a) ? item.a : [];

    const c = Number(item.c);

    if(!q || a.length < 2 || c < 0 || c >= a.length){
        return null;
    }

    return {
        category: item.category || "غير مصنف",
        level: item.level || "غير محدد",
        q,
        a,
        c
    };
}
        
function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

async function startExam(){

    candidateName = document.getElementById("candidateName").value.trim();

    let count = parseInt(document.getElementById("questionCount").value);

    if(!candidateName){
        alert("أدخل الاسم");
        return;
    }

    selectedCount = parseInt(document.getElementById("questionCount").value,10);

    document.getElementById("quiz").innerHTML = "جاري التحميل...";

    const ok = await loadQuestions();
    if(!ok){
        document.getElementById("quiz").innerHTML = "لا توجد أسئلة";
        return;
    }

    const cat = document.getElementById("categoryFilter").value;
    const lvl = document.getElementById("levelFilter").value;

    let pool = allQuestions.filter(q =>
        (cat === "all" || q.category === cat) &&
        (lvl === "all" || q.level === lvl)
    );

    if(pool.length === 0){
        document.getElementById("quiz").innerHTML =
            "لا توجد أسئلة مطابقة للفلاتر";
        return;
    }

    questions = shuffle(pool).slice(0, selectedCount);

    current = 0;
    score = 0;
    wrongAnswers = [];

    showQuestion();
}

function showQuestion(){

    answered = false;

    if(current >= questions.length){
        showResult();
        return;
    }

    const q = questions[current];

    let html = "<div class='question'>";
    html += "<div class='meta'>سؤال " + (current+1) + " من " + questions.length + "</div>";
    html += "<div>" + q.q + "</div>";

    q.a.forEach((ans,i)=>{
        html += "<div class='answer' onclick='answer(" + i + ")'>" + ans + "</div>";
    });

    html += "</div>";

    document.getElementById("quiz").innerHTML = html;
}

function answer(i){

    if(answered) return;
    answered = true;

    const q = questions[current];
    const boxes = document.querySelectorAll(".answer");

    if(i === q.c){
        score++;
        if(boxes[i]) boxes[i].style.background = "#dcfce7";
    }else{
        if(boxes[i]) boxes[i].style.background = "#fee2e2";
        if(boxes[q.c]) boxes[q.c].style.background = "#dcfce7";

        wrongAnswers.push({
            question: q.q,
            yourAnswer: q.a[i],
            correctAnswer: q.a[q.c]
        });
    }

    current++;
    setTimeout(showQuestion, 500);
}

function showResult() {

    const percent = questions.length
        ? Math.round((score / questions.length) * 100)
        : 0;

    const level =
        percent >= 90 ? "ممتاز" :
        percent >= 75 ? "جيد جداً" :
        percent >= 60 ? "جيد" :
        "يحتاج تطوير";

    document.getElementById("total").textContent = questions.length;

    const resultHTML = `
        <div id="resultBox" class="result-container">
            <h2>النتيجة</h2>
            <p>الاسم: ${candidateName}</p>
            <p>الصحيح: ${score}</p>
            <p>الخطأ: ${questions.length - score}</p>
            <p>النسبة: ${percent}%</p>
            <p>التقييم: ${level}</p>
            <div class="buttons">
                <button onclick="printCertificate()">طباعة الشهادة</button>
                <button onclick="location.reload()">إعادة</button>
            </div>
        </div>
    `;

    const quiz = document.getElementById("quiz");
    quiz.innerHTML = "";
    quiz.insertAdjacentHTML("beforeend", resultHTML);

    document.getElementById("certName").innerText = candidateName;
    document.getElementById("certificate").style.display = "none";

    if (wrongAnswers && wrongAnswers.length > 0) {

        const wrongHTML = `
            <div style="margin-top:20px;text-align:right">
                <h3>الأسئلة التي أخطأت فيها</h3>
                <hr>
                ${wrongAnswers.map(w => `
                    <div style="margin:10px;padding:10px;border:1px solid #ddd;border-radius:8px">
                        <p><b>السؤال:</b> ${w.question}</p>
                        <p style="color:red"><b>إجابتك:</b> ${w.yourAnswer}</p>
                        <p style="color:green"><b>الإجابة الصحيحة:</b> ${w.correctAnswer}</p>
                    </div>
                `).join("")}
            </div>
        `;

        document.getElementById("quiz").insertAdjacentHTML("beforeend", wrongHTML);
    }
}

function printCertificate() {

    const certId = "FIQH-" + Date.now();

    const url =
        "certificate.html?name=" + encodeURIComponent(candidateName) +
        "&score=" + score +
        "&total=" + questions.length +
        "&id=" + certId;

  window.location.href = url;
}

</script>

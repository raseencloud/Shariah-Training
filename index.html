<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب الفقهي</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:#d1fae5;
    text-align:center;
    font-family:Tahoma, Arial, sans-serif;
    min-height:100vh;
    padding:20px;
}

h1{
    color:#065f46;
    font-size:40px;
    margin-top:40px;
    margin-bottom:15px;
}

.subtitle{
    font-size:20px;
    color:#166534;
    margin-bottom:30px;
}

.main-card{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    border-top:6px solid #16a34a;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

input,select,button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:16px;
    font-family:Tahoma, Arial, sans-serif;
}

button{
    background:#16a34a;
    color:white;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.question{
    font-size:22px;
    color:#111827;
    font-weight:700;
    margin-bottom:20px;
    line-height:1.8;
}

.answer{
    width:100%;
    margin:8px 0;
    padding:14px;
    background:#f3f4f6;
    border:1px solid #d1d5db;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    color:#000;
    font-weight:800;
}

.answer:hover{
    background:#dcfce7;
}

.footer{
    margin-top:25px;
    color:#6b7280;
    font-size:14px;
}
</style>

</head>

<body>

<h1>🕌 منصة التدريب الفقهي</h1>
<p class="subtitle">تعلم واختبر معلوماتك الشرعية بطريقة تفاعلية</p>

<div class="main-card">

<h2 style="color:#065f46;margin-bottom:20px;">بيانات الاختبار</h2>

<input type="text" id="candidateName" placeholder="أدخل اسم المتدرب">

<select id="questionCount">
<option value="10">10 أسئلة</option>
<option value="20">20 سؤالاً</option>
<option value="30">30 سؤالاً</option>
</select>

<button onclick="startExam()">ابدأ الاختبار</button>

<div id="quiz"></div>

<div class="footer">منصة تدريب شرعي تجريبية</div>

</div>

<script>
let allQuestions = [];
let questions = [];
let current = 0;
let score = 0;
let selectedCount = 10;

async function loadAllQuestions() {
    try {
        const res = await fetch("fiqh-questions.json");

        if (!res.ok) throw new Error("File not found");

        allQuestions = await res.json();

        selectRandomQuestions();
        showQuestion();

    } catch (err) {
        document.getElementById("quiz").innerHTML =
            "<div class='question'>تعذر تحميل الأسئلة، يرجى تحديث الصفحة</div>";
        console.error(err);
    }
}

function selectRandomQuestions() {
    // خلط الأسئلة عشوائياً
    let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
    
    // اختيار عدد الأسئلة المطلوب
    questions = shuffled.slice(0, selectedCount);
}

function startExam() {

    let name = document.getElementById("candidateName").value;

    if (name.trim() === "") {
        alert("يرجى إدخال اسم المتدرب");
        return;
    }

    // الحصول على عدد الأسئلة المختارة
    selectedCount = parseInt(document.getElementById("questionCount").value);

    current = 0;
    score = 0;

    document.getElementById("quiz").innerHTML =
        `<div class="question">مرحباً ${name}<br><br>جاري تحميل الأسئلة...</div>`;

    loadAllQuestions();
}

function showQuestion() {

    if (current >= questions.length) {
        showResult();
        return;
    }

    let q = questions[current];

    let html = `<div class="question">${q.q}<br><br>`;

    q.a.forEach((answer, i) => {
        html += `<button class="answer" onclick="checkAnswer(${i})">${answer}</button>`;
    });

    html += `</div>`;

    document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(i) {

    let q = questions[current];

    if (i === q.c) {
        score++;
    }

    current++;

    setTimeout(() => showQuestion(), 700);
}

function showResult() {

    let percent = Math.round((score / questions.length) * 100);

    let level =
        percent >= 90 ? "ممتاز" :
        percent >= 75 ? "جيد جداً" :
        percent >= 60 ? "جيد" : "يحتاج تطوير";

    let html = "<div class='question'>";
    html += "<h2>📊 النتيجة النهائية</h2>";
    html += "<p>عدد الأسئلة: " + questions.length + "</p>";
    html += "<p>الإجابات الصحيحة: " + score + "</p>";
    html += "<p>النسبة: " + percent + "%</p>";
    html += "<p>التقييم: " + level + "</p>";
    html += "</div>";

    document.getElementById("quiz").innerHTML = html;
}
</script>

</body>
</html>

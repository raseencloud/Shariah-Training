<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب الفقهي</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:#d1fae5;
    text-align:center;
    font-family:Tahoma, Arial, sans-serif;
    min-height:100vh;
    padding:20px;
}

h1{
    color:#065f46;
    font-size:40px;
    margin-top:40px;
    margin-bottom:15px;
}

.subtitle{
    font-size:20px;
    color:#166534;
    margin-bottom:30px;
}

.main-card{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    border-top:6px solid #16a34a;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

input,select,button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:16px;
    font-family:Tahoma, Arial, sans-serif;
}

button{
    background:#16a34a;
    color:white;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.question{
    font-size:22px;
    color:#111827;
    font-weight:700;
    margin-bottom:20px;
    line-height:1.8;
}

.answer{
    width:100%;
    margin:8px 0;
    padding:14px;
    background:#f3f4f6;
    border:1px solid #d1d5db;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    color:#000;
    font-weight:800;
}

.answer:hover{
    background:#dcfce7;
}

.footer{
    margin-top:25px;
    color:#6b7280;
    font-size:14px;
}
</style>

</head>

<body>

<h1>🕌 منصة التدريب الفقهي</h1>
<p class="subtitle">تعلم واختبر معلوماتك الشرعية بطريقة تفاعلية</p>

<div class="main-card">

<h2 style="color:#065f46;margin-bottom:20px;">بيانات الاختبار</h2>

<input type="text" id="candidateName" placeholder="أدخل اسم المتدرب">

<select id="questionCount">
<option value="10">10 أسئلة</option>
<option value="20">20 سؤالاً</option>
<option value="30">30 سؤالاً</option>
</select>

<button onclick="startExam()">ابدأ الاختبار</button>

<div id="quiz"></div>

<div class="footer">منصة تدريب شرعي تجريبية</div>

</div>

<script>

let candidateName = "";
let allQuestions = [];
let questions = [];
let current = 0;
let score = 0;
let selectedCount = 10;

let answered = false;
let lockClick = false;

async function loadQuestions(){
    try{
        const res = await fetch("fiqh-questions.json", { cache:"no-store" });

        if(!res.ok){
            console.log("JSON not found");
            return false;
        }

        const text = await res.text();

        let raw;
        try{
            raw = JSON.parse(text);
        }catch(e){
            console.log("JSON INVALID");
            document.getElementById("quiz").innerHTML =
                "ملف الأسئلة يحتوي خطأ";
            return false;
        }

        if(!Array.isArray(raw)){
            console.log("NOT ARRAY");
            return false;
        }

        allQuestions = raw.map(normalize).filter(Boolean);

        if(allQuestions.length === 0){
            document.getElementById("quiz").innerHTML =
                "لا توجد أسئلة صالحة";
            return false;
        }

        return true;

    }catch(e){
        console.log(e);
        document.getElementById("quiz").innerHTML =
            "فشل تحميل الملف";
        return false;
    }
}

function selectRandomQuestions() {

    let shuffled = [...allQuestions];

    for (let i = shuffled.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1));

        [shuffled[i], shuffled[j]] =
        [shuffled[j], shuffled[i]];
    }

    questions = shuffled.slice(0, selectedCount);
}

async function startExam(){

    candidateName = document.getElementById("candidateName").value.trim();

    if(!candidateName){
        alert("يرجى إدخال الاسم");
        return;
    }

    selectedCount = parseInt(document.getElementById("questionCount").value,10);

    document.getElementById("quiz").innerHTML =
        "<div class='question'>جاري تحميل الاختبار...</div>";

    const ok = await loadAllQuestions();
    if(!ok) return;

    buildExamQuestions();

    if(questions.length === 0){
        document.getElementById("quiz").innerHTML =
            "<div class='question'>لا توجد أسئلة مطابقة</div>";
        return;
    }

    current = 0;
    score = 0;

    showQuestion();
}
    
function showQuestion() {

    answered = false;
    lockClick = false;

    if (current >= questions.length) {
        showResult();
        return;
    }

    const q = questions[current];

    if (!q) {
        showResult();
        return;
    }

    let html = `<div class="question">${q.q}<br><br>`;

    q.a.forEach((answer, i) => {
        html += `<button class="answer" onclick="checkAnswer(${i})">${answer}</button>`;
    });

    html += `</div>`;

    document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(selectedIndex) {

    if (answered || lockClick) return;

    answered = true;
    lockClick = true;

    const q = questions[current];
    const correctIndex = Number(q.c);

    const answers = document.querySelectorAll(".answer");

    if (selectedIndex === correctIndex) {

        score++;
        answers[selectedIndex].style.background = "#dcfce7";

    } else {

        answers[selectedIndex].style.background = "#fee2e2";
        answers[correctIndex].style.background = "#dcfce7";
    }

    current++;

    setTimeout(showQuestion, 600);
}

function showResult() {

    let percent =
        Math.round((score / questions.length) * 100);

    let level =
        percent >= 90 ? "ممتاز" :
        percent >= 75 ? "جيد جداً" :
        percent >= 60 ? "جيد" :
        "يحتاج تطوير";

    let wrong = questions.length - score;

    document.getElementById("quiz").innerHTML = `
    <div class="question">

        <h2>📊 تقرير الأداء</h2>

        <p>المتدرب: ${candidateName}</p>
        <p>عدد الأسئلة: ${questions.length}</p>
        <p>الإجابات الصحيحة: ${score}</p>
        <p>الإجابات الخاطئة: ${wrong}</p>
        <p>النسبة: ${percent}%</p>
        <p>التقييم: ${level}</p>

        <hr>

        <button onclick="showCertificate()"
            style="background:#065f46;color:white;padding:12px;border:none;border-radius:10px;width:100%;">
            🎓 إصدار شهادة
        </button>

    </div>`;
}

function showCertificate() {

    let percent =
        Math.round((score / questions.length) * 100);

    document.getElementById("quiz").innerHTML = `
    <div class="question">

        <h2>🎓 شهادة إتمام التدريب</h2>

        <p style="font-size:18px;line-height:2;">

            تشهد منصة التدريب الفقهي بأن<br><br>

            <b>${candidateName}</b><br><br>

            حصل على نتيجة<br>

            <b>${score} / ${questions.length}</b><br>
            بنسبة <b>${percent}%</b><br><br>

            نسأل الله له التوفيق والسداد.

        </p>

        <button onclick="showResult()"
            style="margin-top:10px;background:#16a34a;color:white;padding:10px;border:none;border-radius:10px;width:100%;">
            العودة للتقرير
        </button>

    </div>`;
}

</script>
</body>
</html>
